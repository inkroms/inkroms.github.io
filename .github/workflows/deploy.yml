name: Deploy Hexo to GitHub Pages

on:
  push:
    branches: [main]   # 推送到 main 分支时自动构建部署
  workflow_dispatch:    # 也允许在 Actions 页面手动触发

# 授予工作流向 Pages 发布的权限（认证走内置 GITHUB_TOKEN，无需任何手填密钥）
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只允许一个部署，新推送会取消进行中的旧部署
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (hexo generate)
        run: npx hexo clean && npx hexo generate

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
